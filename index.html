<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>5G NR 通道知識測驗</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121820">

<!-- iOS: 加到主畫面後以全螢幕獨立 App 模式開啟 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="5G NR 測驗">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    /* --- 基礎背景與面板：調高亮度、拉開層次，眼睛不易疲勞 --- */
    --bg: #121820;          /* 稍微帶點藍灰的深色背景，比純黑溫和 */
    --panel: #1A232E;       /* 主面板，與背景拉開對比 */
    --panel-2: #222E3D;     /* 卡片與按鈕背景，讓層次更立體 */
    
    /* --- 線條與外框：讓邊界更清晰 --- */
    --grid-line: rgba(94, 234, 212, 0.04);
    --border: #2D3D52;      /* 加亮邊框 */
    --border-soft: #243245; /* 軟邊框 */
    
    /* --- 文字顏色：稍微降低純白度，極大提升長時間閱讀的舒適度 --- */
    --text: #F0F4F8;        /* 主要文字：改成舒適的奶白/冷灰白 */
    --text-dim: #94A3B8;    /* 次要說明：提高亮度，避免原本太暗看不清 */
    --text-faint: #64748B;  /* 輔助文字/未解鎖狀態 */
    
    /* --- 核心主題色（維持原本帥氣的 5G 科技青綠色，但微調亮） --- */
    --accent: #2DD4BF;      
    --accent-dim: #14B8A6;  
    
    /* --- 狀態顏色：調高明度和飽和度，讓答題回饋更直覺 --- */
    --easy: #34D399;
    --medium: #F59E0B;      /* 微調橘黃，更顯眼 */
    --hard: #FB7185;
    --correct: #4ADE80;     /* 答對綠 */
    --wrong: #F87171;       /* 答錯紅 */
    
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
    --body: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Heiti TC", sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .scope {
    position: relative;
    width: 100%;
    max-width: 640px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px 22px;
    overflow: hidden;
  }

  .scope-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  .scope-header { position: relative; margin-bottom: 26px; }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    flex-shrink: 0;
  }

  .scope-header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  main { position: relative; }

  /* 進度格：仿資源格風格 */
  .progress-grid { display: flex; gap: 8px; margin-bottom: 20px; }
  .slot {
    flex: 1;
    height: 40px;
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-faint);
    background: var(--panel-2);
    transition: border-color 0.25s ease, background 0.25s ease, color 0.25s ease;
  }
  .slot--active { border-color: var(--accent); color: var(--accent); }
  .slot--correct { border-color: var(--correct); background: rgba(74, 222, 128, 0.12); color: var(--correct); }
  .slot--wrong { border-color: var(--wrong); background: rgba(248, 113, 113, 0.12); color: var(--wrong); }

  @media (prefers-reduced-motion: no-preference) {
    .slot--active { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(94,234,212,0); }
      50% { box-shadow: 0 0 12px rgba(94,234,212,0.5); }
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .slot--active { box-shadow: 0 0 10px rgba(94,234,212,0.4); }
  }

  /* 開始畫面 */
  .start-desc { color: var(--text-dim); font-size: 14px; line-height: 1.75; margin-bottom: 20px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .chip {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-dim);
    background: var(--panel-2);
  }
  .stats { display: flex; gap: 16px; margin-bottom: 26px; flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .btn-start {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #06201C;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-start:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(94,234,212,0.25); }
  .btn-start:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  /* 題目卡片 */
  .quiz-card { background: var(--panel-2); border: 1px solid var(--border-soft); border-radius: 12px; padding: 22px; }
  .badges { display: flex; gap: 8px; margin-bottom: 16px; }
  .badge { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; padding: 4px 9px; border-radius: 5px; }
  .badge--easy { background: rgba(52,211,153,0.15); color: var(--easy); }
  .badge--medium { background: rgba(251,191,36,0.15); color: var(--medium); }
  .badge--hard { background: rgba(251,113,133,0.15); color: var(--hard); }
  .badge--topic { background: rgba(94,234,212,0.1); color: var(--accent); }

  .question { font-size: 16px; line-height: 1.65; margin-bottom: 20px; font-weight: 500; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    width: 100%;
    padding: 13px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--panel);
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, opacity 0.15s ease;
  }
  .option:hover:not(:disabled) { border-color: var(--accent-dim); background: var(--panel-2); }
  .option:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .option:disabled { cursor: default; }
  .option-letter { font-family: var(--mono); font-size: 12px; color: var(--text-faint); width: 18px; flex-shrink: 0; }
  .option--correct { border-color: var(--correct); background: rgba(74,222,128,0.1); }
  .option--correct .option-letter { color: var(--correct); }
  .option--wrong { border-color: var(--wrong); background: rgba(248,113,113,0.1); }
  .option--wrong .option-letter { color: var(--wrong); }
  .option--muted { opacity: 0.4; }

  .feedback { margin-top: 16px; padding: 14px 16px; border-radius: 10px; border-left: 3px solid; }
  .feedback--correct { background: rgba(74,222,128,0.08); border-color: var(--correct); }
  .feedback--wrong { background: rgba(248,113,113,0.08); border-color: var(--wrong); }
  .feedback-title { font-family: var(--mono); font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .feedback--correct .feedback-title { color: var(--correct); }
  .feedback--wrong .feedback-title { color: var(--wrong); }
  .feedback-text { font-size: 13px; line-height: 1.75; color: var(--text-dim); }

  .btn-next {
    margin-top: 16px;
    width: 100%;
    padding: 13px;
    border: 1px solid var(--accent);
    border-radius: 10px;
    background: transparent;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-next:hover { background: rgba(94,234,212,0.08); }
  .btn-next:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* 結果畫面 */
  .result { text-align: center; }
  .result-score { font-family: var(--mono); font-size: 56px; font-weight: 700; color: var(--accent); margin: 12px 0 4px; }
  .result-total { font-size: 28px; color: var(--text-faint); }
  .result-msg { color: var(--text-dim); font-size: 14px; margin-bottom: 22px; }
  .result .progress-grid { margin-bottom: 22px; }

  .scope-footer {
    position: relative;
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px solid var(--border-soft);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    text-align: center;
  }

  @media (max-width: 480px) {
    .scope { padding: 24px 18px 18px; }
    .result-score { font-size: 44px; }
    .slot { height: 34px; font-size: 11px; }
    .question { font-size: 15px; }
  }
  /* ============================================================
     優化新增樣式 — 分類 / 題數 / 逐題檢討 / 鍵盤提示
     全部使用新 class 名，並沿用既有 --變數，避免覆蓋原有樣式
     ============================================================ */
  .section-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin: 22px 0 10px; }

  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cat-btn {
    display: flex; align-items: center; gap: 11px; text-align: left; width: 100%;
    padding: 13px 14px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--panel-2); color: var(--text); cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }
  .cat-btn:hover { border-color: var(--accent-dim); }
  .cat-btn:active { transform: translateY(1px); }
  .cat-btn--active { border-color: var(--accent); background: rgba(94,234,212,0.06); }
  .cat-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cat-body { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .cat-name { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .cat-blurb { font-size: 11px; color: var(--text-dim); line-height: 1.45; }
  .cat-count { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

  .len-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
  .len-btn {
    padding: 9px 16px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--panel-2); color: var(--text-dim); cursor: pointer;
    font-family: var(--mono); font-size: 13px;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  .len-btn:hover { border-color: var(--accent-dim); color: var(--text); }
  .len-btn--active { border-color: var(--accent); color: var(--accent); background: rgba(94,234,212,0.06); }

  .kbd-hint { margin-top: 14px; text-align: center; font-size: 11px; color: var(--text-faint); line-height: 1.9; }
  .kbd-hint kbd {
    font-family: var(--mono); font-size: 10px; padding: 2px 6px; margin: 0 1px;
    border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 4px;
    background: var(--panel-2); color: var(--text-dim);
  }

  .chip--miss { border-color: var(--wrong); color: var(--wrong); background: rgba(248,113,113,0.08); }

  .review { display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .review-row {
    display: grid; grid-template-columns: 20px auto 1fr; align-items: baseline; gap: 10px;
    padding: 9px 12px; border: 1px solid var(--border-soft); border-radius: 8px; background: var(--panel-2);
  }
  .review-mark { font-family: var(--mono); font-weight: 700; font-size: 13px; }
  .review-mark--ok { color: var(--correct); }
  .review-mark--no { color: var(--wrong); }
  .review-topic { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .review-cat { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .review-q { font-size: 13px; color: var(--text); line-height: 1.5; }
  .review-empty { font-size: 13px; color: var(--text-dim); padding: 6px 0; }

  .result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 22px; }
  .result-actions .btn-next, .result-actions .btn-start { margin-top: 0; }

  /* 題數多時進度格自動換行，並縮小最小寬度 */
  .progress-grid { flex-wrap: wrap; }
  .slot { min-width: 30px; }

  @media (max-width: 560px) {
    .cat-grid { grid-template-columns: 1fr; }
    .review-row { grid-template-columns: 18px 1fr; }
    .review-q { grid-column: 1 / -1; }
  }

  /* ============================================================
     每日積分累積條（賽博龐克風格）— 位於測驗框外側
     每天早上 08:00 重置，共 50 格，答對一題累積一格
     ============================================================ */
  :root {
    --cyber-pink: #FF2E88;
    --cyber-cyan: #00F0FF;
    --cyber-yellow: #FCEE0A;
    --cyber-panel: #0C0F1A;
  }

  .layout {
    display: flex;
    align-items: flex-start;
    gap: 22px;
    width: 100%;
    max-width: 780px;
    justify-content: center;
  }
  .layout .scope { flex: 1; min-width: 0; }

  .daily-bar {
    position: sticky;
    top: 24px;
    flex-shrink: 0;
    width: 118px;
    background: var(--cyber-panel);
    border: 1px solid var(--cyber-cyan);
    clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
    padding: 16px 12px 14px;
    box-shadow: 0 0 18px rgba(0, 240, 255, 0.18), inset 0 0 24px rgba(0, 240, 255, 0.05);
    overflow: hidden;
  }
  .daily-bar::before {  /* 掃描線 */
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,240,255,0.05) 0 1px, transparent 1px 4px);
    pointer-events: none;
  }
  .daily-bar::after {   /* 角落裝飾 */
    content: "";
    position: absolute; top: 0; right: 0;
    width: 34px; height: 3px;
    background: var(--cyber-pink);
    box-shadow: 0 0 8px var(--cyber-pink);
  }

  .daily-head {
    position: relative;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--cyber-cyan);
    text-shadow: 0 0 6px rgba(0,240,255,0.6);
    margin-bottom: 4px;
    white-space: nowrap;
  }
  .daily-count {
    position: relative;
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--cyber-pink);
    text-shadow: 0 0 10px rgba(255,46,136,0.7);
    margin-bottom: 12px;
  }
  .daily-count .daily-count-total { font-size: 11px; color: var(--text-faint); text-shadow: none; }

  .daily-track {
    position: relative;
    display: flex;
    flex-direction: column-reverse; /* 由下往上填 */
    gap: 3px;
  }
  .daily-cell {
    height: 7px;
    border: 1px solid rgba(0, 240, 255, 0.25);
    background: rgba(0, 240, 255, 0.04);
    clip-path: polygon(3px 0, 100% 0, calc(100% - 3px) 100%, 0 100%); /* 平行四邊形 */
    transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .daily-cell--tick { border-color: rgba(252, 238, 10, 0.45); } /* 每 10 格一個刻度色 */
  .daily-cell--filled {
    background: linear-gradient(90deg, var(--cyber-cyan), var(--cyber-pink));
    border-color: var(--cyber-cyan);
    box-shadow: 0 0 6px rgba(0, 240, 255, 0.55);
  }
  .daily-cell--latest { animation: cellFlicker 1.4s ease-in-out infinite; }
  @keyframes cellFlicker {
    0%, 100% { box-shadow: 0 0 4px rgba(255,46,136,0.4); }
    50% { box-shadow: 0 0 12px rgba(255,46,136,0.95); }
  }
  @media (prefers-reduced-motion: reduce) {
    .daily-cell--latest { animation: none; box-shadow: 0 0 10px rgba(255,46,136,0.8); }
  }

  .daily-foot {
    position: relative;
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 8.5px;
    letter-spacing: 0.14em;
    color: var(--text-faint);
    white-space: nowrap;
  }
  .daily-foot span { color: var(--cyber-yellow); }

  .daily-bar--done {
    border-color: var(--cyber-pink);
    box-shadow: 0 0 26px rgba(255,46,136,0.45), inset 0 0 30px rgba(255,46,136,0.08);
  }

  /* 「今日進度完成」橫幅 */
  .daily-done {
    position: fixed;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    z-index: 99;
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3em;
    padding: 12px 26px 12px 30px;
    color: var(--cyber-yellow);
    background: rgba(12, 15, 26, 0.92);
    border: 1px solid var(--cyber-pink);
    clip-path: polygon(16px 0, 100% 0, calc(100% - 16px) 100%, 0 100%);
    text-shadow: 0 0 10px rgba(252,238,10,0.8), 2px 0 0 rgba(255,46,136,0.6), -2px 0 0 rgba(0,240,255,0.6);
    box-shadow: 0 0 24px rgba(255,46,136,0.5);
    animation: bannerGlitch 2.6s steps(1) infinite;
  }
  .daily-done[hidden] { display: none; }
  @keyframes bannerGlitch {
    0%, 92%, 100% { transform: translateX(-50%); }
    93% { transform: translateX(calc(-50% + 2px)); }
    95% { transform: translateX(calc(-50% - 2px)); }
    97% { transform: translateX(calc(-50% + 1px)); }
  }
  @media (prefers-reduced-motion: reduce) {
    .daily-done { animation: none; }
  }

  /* 窄螢幕：積分條改為橫向、放在測驗框上方 */
  @media (max-width: 720px) {
    .layout { flex-direction: column-reverse; align-items: stretch; gap: 16px; }
    .daily-bar { position: static; width: 100%; }
    .daily-track { flex-direction: row; flex-wrap: wrap; }
    .daily-cell { flex: 1 0 14px; height: 14px; }
    .daily-head { font-size: 10px; }
  }

</style>
</head>
<body>
  <div class="daily-done" id="dailyDone" hidden>▚▚ 今日進度完成 ▞▞</div>

  <div class="layout">
    <div class="scope">
      <div class="scope-grid" aria-hidden="true"></div>
      <header class="scope-header">
        <div class="eyebrow"><span class="dot"></span>5G NR · PHY LAYER</div>
        <h1>通道知識測驗</h1>
      </header>
      <main id="app"></main>
      <footer class="scope-footer" id="footer"></footer>
    </div>

    <aside class="daily-bar" id="dailyBar" aria-label="每日積分累積條">
      <div class="daily-head">DAILY // XP</div>
      <div class="daily-count" id="dailyCountText">0<span class="daily-count-total">/50</span></div>
      <div class="daily-track" id="dailyTrack"></div>
      <div class="daily-foot">RESET <span>08:00</span></div>
    </aside>
  </div>

<script>
  // ============================================================
  // 題庫 — 要新增題目，直接在 QUESTION_BANK 陣列裡照格式加一個物件即可

  // ============================================================
  // 分類系統（把 26 個主題歸成 4 大類 + 其他）
  //   優化新增：只用來「分類與抽題」，完全不改動上面的題庫內容
  // ============================================================
  const CATEGORY_META = {
    basic:{ label: "5G 基本功",       blurb: "frame / subframe / slot / symbol、SCS、RB / RE、頻段與波形", color: "#34D399" },
    phy:  { label: "5G NR 實體通道", blurb: "SSB / PDCCH / PDSCH / PUCCH / PUSCH / PRACH / 參考訊號", color: "var(--accent)" },
    fapi: { label: "FAPI（SCF-222）",  blurb: "P5 控制面、P7 資料面、狀態機、時序、PDU、nFAPI", color: "#A78BFA" },
    oran: { label: "O-RAN 架構",       blurb: "O-CU/O-DU/O-RU、功能切分、介面、Open FH、S-Plane", color: "#38BDF8" },
    si:   { label: "系統整合實務",     blurb: "UE→gNB 流程、整合除錯、名詞速查", color: "#FBBF24" },
    other:{ label: "其他",             blurb: "未分類主題", color: "var(--text-dim)" }
  };
  const CATEGORY_ORDER = ["basic", "phy", "fapi", "oran", "si", "other"];
  const TOPIC_CATEGORY = {
    "命名規則": "phy", "SSB": "phy", "PDCCH": "phy", "PDSCH": "phy", "PUCCH": "phy",
    "PUSCH": "phy", "PRACH": "phy", "DMRS": "phy", "CSI-RS": "phy", "SRS": "phy", "CSI-RS vs SRS": "phy",
    "FAPI 定位": "fapi", "P5 控制面": "fapi", "P7 資料面": "fapi", "FAPI 狀態機": "fapi",
    "FAPI 時序": "fapi", "FAPI PDU": "fapi", "nFAPI": "fapi",
    "O-CU/O-DU/O-RU": "oran", "功能切分": "oran", "O-RAN 介面": "oran", "Open Fronthaul": "oran", "同步 S-Plane": "oran",
    "UE→gNB 流程": "si", "整合除錯": "si", "名詞速查": "si",
    "量測": "phy", "波束管理": "phy",
    "基礎參數": "basic", "時間單位": "basic", "頻率單位": "basic"
  };
  function catOf(topic) { return TOPIC_CATEGORY[topic] || "other"; }
  function poolFor(catId) {
    return catId === "all" ? QUESTION_BANK : QUESTION_BANK.filter(q => catOf(q.topic) === catId);
  }
  // 依題庫大小決定可選題數：5/10/20 中小於總數者 + 「全部」
  function lengthChoices(poolSize) {
    const base = [5, 10, 20].filter(v => v < poolSize);
    base.push(poolSize);
    return base;
  }

  // ============================================================
  // 狀態與流程控制
  // ============================================================
  let state = {
    screen: "start", // "start" | "quiz" | "result"
    questions: [],
    currentIndex: 0,
    answers: [],
    selectedOption: null,
    answered: false,
    category: "all", // 優化新增：目前選的分類（"all" 或 CATEGORY_ORDER 的 id）
    length: 5        // 優化新增：本次抽題數
  };

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ---- 抽題隨機性強化 ----
  // 1) 近期出過的題（記錄在 localStorage，環境不支援時退回記憶體）排到最後才抽
  // 2) 每題的選項順序隨機打亂，answer index 自動重新對應
  function qid(q) {
    let h = 0;
    for (let i = 0; i < q.question.length; i++) h = (h * 31 + q.question.charCodeAt(i)) >>> 0;
    return h.toString(36);
  }
  let recentMem = [];
  function loadRecent() {
    try { return JSON.parse(localStorage.getItem("quiz5g_recent") || "[]"); }
    catch (e) { return recentMem; }
  }
  function saveRecent(list) {
    recentMem = list;
    try { localStorage.setItem("quiz5g_recent", JSON.stringify(list)); } catch (e) {}
  }

  // ============================================================
  // 每日積分累積條 — 每天早上 08:00 重置，共 50 格
  //   答對一題累積一格；集滿 50 格顯示「今日進度完成」
  //   以 localStorage 保存（環境不支援時退回記憶體，僅本次有效）
  // ============================================================
  const DAILY_TOTAL = 50;
  let dailyMem = null;

  // 「積分日」的計算：把現在時間往前推 8 小時再取日期，
  // 這樣 08:00 之前仍算前一天，一過 08:00 就換新的一天 → 自動重置
  function dailyKey() {
    const d = new Date(Date.now() - 8 * 3600 * 1000);
    return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
  }
  function loadDaily() {
    let data = null;
    try { data = JSON.parse(localStorage.getItem("quiz5g_daily")); }
    catch (e) { data = dailyMem; }
    if (!data || data.day !== dailyKey()) data = { day: dailyKey(), count: 0 };
    return data;
  }
  function saveDaily(data) {
    dailyMem = data;
    try { localStorage.setItem("quiz5g_daily", JSON.stringify(data)); } catch (e) {}
  }
  function addDailyPoint() {
    const d = loadDaily();
    if (d.count < DAILY_TOTAL) {
      d.count++;
      saveDaily(d);
    }
    renderDaily();
  }
  function renderDaily() {
    const d = loadDaily();
    saveDaily(d); // 若剛跨過 08:00，順便把重置後的狀態寫回

    const track = document.getElementById("dailyTrack");
    let cells = "";
    for (let i = 0; i < DAILY_TOTAL; i++) {
      let cls = "daily-cell";
      if ((i + 1) % 10 === 0) cls += " daily-cell--tick";
      if (i < d.count) cls += " daily-cell--filled";
      if (i === d.count - 1 && d.count < DAILY_TOTAL) cls += " daily-cell--latest";
      cells += '<div class="' + cls + '"></div>';
    }
    track.innerHTML = cells;

    document.getElementById("dailyCountText").innerHTML =
      d.count + '<span class="daily-count-total">/' + DAILY_TOTAL + "</span>";

    const done = d.count >= DAILY_TOTAL;
    document.getElementById("dailyBar").classList.toggle("daily-bar--done", done);
    document.getElementById("dailyDone").hidden = !done;
  }
  // 每 30 秒檢查一次：頁面一直開著也會在跨過 08:00 時自動重置
  setInterval(renderDaily, 30000);

  function shuffleOptions(q) {
    const order = shuffle(q.options.map((_, i) => i));
    return Object.assign({}, q, {
      options: order.map(i => q.options[i]),
      answer: order.indexOf(q.answer)
    });
  }
  function pickQuestions(pool, n) {
    const recent = new Set(loadRecent());
    const fresh = shuffle(pool.filter(q => !recent.has(qid(q))));
    const seen  = shuffle(pool.filter(q => recent.has(qid(q))));
    const picked = fresh.concat(seen).slice(0, n);
    // 記錄最近出過的題，上限為題庫的六成，避免把整個題庫都排除掉
    const cap = Math.max(n, Math.floor(QUESTION_BANK.length * 0.6));
    const ids = picked.map(qid);
    saveRecent(ids.concat(loadRecent().filter(id => !ids.includes(id))).slice(0, cap));
    return picked.map(shuffleOptions);
  }

  function startQuiz(topicFilter) {
    // topicFilter（可選）：只從這些主題抽題，用於「只練答錯的主題」
    let pool;
    if (Array.isArray(topicFilter) && topicFilter.length) {
      const set = new Set(topicFilter);
      pool = QUESTION_BANK.filter(q => set.has(q.topic));
    } else {
      pool = poolFor(state.category);
    }
    if (!pool.length) pool = QUESTION_BANK;
    const n = Math.min(state.length, pool.length);
    state.questions = pickQuestions(pool, n);
    state.currentIndex = 0;
    state.answers = [];
    state.selectedOption = null;
    state.answered = false;
    state.screen = "quiz";
    render();
  }

  function setCategory(id) {
    state.category = id;
    const size = poolFor(id).length;
    // 若目前選的題數在新分類已不合法，退回該分類的「全部」
    if (!lengthChoices(size).includes(state.length)) state.length = size;
    render();
  }

  function setLength(n) {
    state.length = n;
    render();
  }

  function selectOption(idx) {
    if (state.answered) return;
    state.selectedOption = idx;
    state.answered = true;
    const q = state.questions[state.currentIndex];
    const correct = idx === q.answer;
    state.answers.push({ correct: correct, topic: q.topic });
    if (correct) addDailyPoint(); // 答對 → 每日積分 +1 格
    render();
  }

  function nextQuestion() {
    if (state.currentIndex < state.questions.length - 1) {
      state.currentIndex++;
      state.selectedOption = null;
      state.answered = false;
      render();
    } else {
      state.screen = "result";
      render();
    }
  }

  function restart() {
    state.screen = "start";
    render();
  }

  // 「只練答錯的主題」：主題清單存在變數中，避免把 JSON 內嵌進 onclick 屬性
  let lastMissedTopics = [];
  function practiceMissed() { startQuiz(lastMissedTopics); }

  // ============================================================
  // 畫面渲染
  // ============================================================
  function renderProgress() {
    let html = '<div class="progress-grid">';
    for (let i = 0; i < state.questions.length; i++) {
      let cls = "slot";
      if (i < state.answers.length) {
        cls += state.answers[i].correct ? " slot--correct" : " slot--wrong";
      } else if (i === state.currentIndex && state.screen === "quiz") {
        cls += " slot--active";
      }
      html += '<div class="' + cls + '">' + (i + 1) + '</div>';
    }
    html += '</div>';
    return html;
  }

  function renderStart() {
    const cat = state.category;
    const pool = poolFor(cat);
    const topics = [...new Set(pool.map(q => q.topic))];
    const counts = {
      easy: pool.filter(q => q.difficulty === "easy").length,
      medium: pool.filter(q => q.difficulty === "medium").length,
      hard: pool.filter(q => q.difficulty === "hard").length
    };

    // 分類卡（「全部」＋ 各大類）
    let cards = `
      <button class="cat-btn${cat === "all" ? " cat-btn--active" : ""}" onclick="setCategory('all')">
        <span class="cat-swatch" style="background:var(--accent)"></span>
        <span class="cat-body">
          <span class="cat-name">全部主題</span>
          <span class="cat-blurb">${QUESTION_BANK.length} 題一起練，難度與分類混合</span>
        </span>
        <span class="cat-count">${QUESTION_BANK.length}</span>
      </button>`;
    cards += CATEGORY_ORDER.map(id => {
      const m = CATEGORY_META[id];
      const n = poolFor(id).length;
      if (!n) return "";
      return `
      <button class="cat-btn${cat === id ? " cat-btn--active" : ""}" onclick="setCategory('${id}')">
        <span class="cat-swatch" style="background:${m.color}"></span>
        <span class="cat-body">
          <span class="cat-name">${m.label}</span>
          <span class="cat-blurb">${m.blurb}</span>
        </span>
        <span class="cat-count">${n}</span>
      </button>`;
    }).join("");

    // 題數選擇
    const lenBtns = lengthChoices(pool.length).map(v => {
      const label = v === pool.length ? `全部 ${v}` : `${v} 題`;
      return `<button class="len-btn${state.length === v ? " len-btn--active" : ""}" onclick="setLength(${v})">${label}</button>`;
    }).join("");

    const catLabel = cat === "all" ? "全部主題" : CATEGORY_META[cat].label;
    const willDraw = Math.min(state.length, pool.length);

    return `
      <p class="start-desc">選一個分類、決定抽幾題就能開始。題目會從所選範圍內隨機抽出，難度混合。目前選擇：<strong style="color:var(--text)">${catLabel}</strong>（${pool.length} 題）。</p>

      <div class="section-label">選擇分類</div>
      <div class="cat-grid">${cards}</div>

      <div class="section-label">此分類涵蓋主題</div>
      <div class="chips">${topics.map(t => `<span class="chip">${t}</span>`).join("")}</div>

      <div class="stats">
        <span class="stat"><span class="stat-dot" style="background:var(--easy)"></span>EASY ${counts.easy}</span>
        <span class="stat"><span class="stat-dot" style="background:var(--medium)"></span>MEDIUM ${counts.medium}</span>
        <span class="stat"><span class="stat-dot" style="background:var(--hard)"></span>HARD ${counts.hard}</span>
      </div>

      <div class="section-label">出題數</div>
      <div class="len-row">${lenBtns}</div>

      <button class="btn-start" onclick="startQuiz()">開始測驗 · 抽 ${willDraw} 題</button>
      <div class="kbd-hint">作答時：按 <kbd>1</kbd>–<kbd>4</kbd> 或 <kbd>A</kbd>–<kbd>D</kbd> 選答 · <kbd>Enter</kbd> 下一題</div>
    `;
  }

  function renderOptions(q) {
    return q.options.map((opt, i) => {
      let cls = "option";
      if (state.answered) {
        if (i === q.answer) cls += " option--correct";
        else if (i === state.selectedOption) cls += " option--wrong";
        else cls += " option--muted";
      }
      const disabled = state.answered ? "disabled" : "";
      return `<button class="${cls}" ${disabled} onclick="selectOption(${i})">
        <span class="option-letter">${String.fromCharCode(65 + i)}</span>
        <span class="option-text">${opt}</span>
      </button>`;
    }).join("");
  }

  function renderFeedback(q) {
    if (!state.answered) return "";
    const correct = state.selectedOption === q.answer;
    const isLast = state.currentIndex === state.questions.length - 1;
    return `
      <div class="feedback feedback--${correct ? "correct" : "wrong"}">
        <div class="feedback-title">${correct ? "✓ 答對了" : "✗ 答錯了，正確答案是 " + String.fromCharCode(65 + q.answer)}</div>
        <div class="feedback-text">${q.explanation}</div>
      </div>
      <button class="btn-next" onclick="nextQuestion()">${isLast ? "看結果 →" : "下一題 →"}</button>
    `;
  }

  function renderQuiz() {
    const q = state.questions[state.currentIndex];
    const diffLabel = { easy: "EASY", medium: "MEDIUM", hard: "HARD" }[q.difficulty];
    return `
      ${renderProgress()}
      <div class="quiz-card">
        <div class="badges">
          <span class="badge badge--${q.difficulty}">${diffLabel}</span>
          <span class="badge badge--topic">${q.topic}</span>
        </div>
        <div class="question">${q.question}</div>
        <div class="options">${renderOptions(q)}</div>
        ${renderFeedback(q)}
      </div>
    `;
  }

  function renderResult() {
    const correctCount = state.answers.filter(a => a.correct).length;
    const total = state.questions.length;
    let msg;
    if (correctCount === total) msg = "滿分！這個範圍你已經很熟了。";
    else if (correctCount >= total * 0.6) msg = "不錯，再抓幾個弱點就更穩了。";
    else msg = "這輪弱點還不少，建議回頭複習一下。";

    // 逐題檢討 + 依主題統計答錯
    const missByTopic = {};
    const reviewRows = state.questions.map((q, i) => {
      const a = state.answers[i];
      const ok = a && a.correct;
      if (!ok) missByTopic[q.topic] = (missByTopic[q.topic] || 0) + 1;
      const color = (CATEGORY_META[catOf(q.topic)] || CATEGORY_META.other).color;
      return `
        <div class="review-row">
          <span class="review-mark ${ok ? "review-mark--ok" : "review-mark--no"}">${ok ? "✓" : "✗"}</span>
          <span class="review-topic"><span class="review-cat" style="background:${color}"></span>${q.topic}</span>
          <span class="review-q">${q.question}</span>
        </div>`;
    }).join("");

    const missedTopics = Object.keys(missByTopic);
    const missSummary = missedTopics.length
      ? missedTopics.map(t => `<span class="chip chip--miss">${t} ×${missByTopic[t]}</span>`).join("")
      : `<div class="review-empty">這一輪沒有答錯的主題，漂亮！</div>`;

    lastMissedTopics = missedTopics;
    const practiceMissedBtn = missedTopics.length
      ? `<button class="btn-next" onclick="practiceMissed()">只練這輪答錯的主題 →</button>`
      : "";

    return `
      <div class="result">
        <div class="result-score">${correctCount}<span class="result-total">/${total}</span></div>
        <div class="result-msg">${msg}</div>
        ${renderProgress()}

        <div class="section-label" style="text-align:left">答錯的主題</div>
        <div class="chips" style="justify-content:flex-start">${missSummary}</div>

        <div class="section-label" style="text-align:left">逐題檢討</div>
        <div class="review">${reviewRows}</div>

        <div class="result-actions">
          ${practiceMissedBtn}
          <button class="btn-next" onclick="startQuiz()">再測一次（同分類）</button>
          <button class="btn-start" onclick="restart()">換個分類 →</button>
        </div>
      </div>
    `;
  }

  function render() {
    const app = document.getElementById("app");
    if (state.screen === "start") app.innerHTML = renderStart();
    else if (state.screen === "quiz") app.innerHTML = renderQuiz();
    else if (state.screen === "result") app.innerHTML = renderResult();

    const topicCount = new Set(QUESTION_BANK.map(q => q.topic)).size;
    const catN = CATEGORY_ORDER.filter(id => id !== "other" && poolFor(id).length > 0).length;
    document.getElementById("footer").textContent =
      `題庫共 ${QUESTION_BANK.length} 題 · ${catN} 大分類 · 涵蓋 ${topicCount} 個主題`;
  }

  // ============================================================
  // 鍵盤操作（優化新增）
  //   作答中：1-4 / A-D 選答；已作答：Enter / → / 空白 下一題
  //   起始頁與結果頁：Enter 直接開始  製作:Duke Liu                                               
  // ============================================================
  document.addEventListener("keydown", (e) => {
    if (state.screen === "quiz") {
      const q = state.questions[state.currentIndex];
      if (!state.answered) {
        let idx = -1;
        if (e.key >= "1" && e.key <= "4") idx = parseInt(e.key, 10) - 1;
        else {
          const k = e.key.toLowerCase();
          if (k >= "a" && k <= "d") idx = k.charCodeAt(0) - 97;
        }
        if (idx >= 0 && idx < q.options.length) { e.preventDefault(); selectOption(idx); }
      } else if (e.key === "Enter" || e.key === "ArrowRight" || e.key === " ") {
        e.preventDefault(); nextQuestion();
      }
    } else if (e.key === "Enter") {
      // 焦點在按鈕（分類/題數等）上時，讓 Enter 正常觸發該按鈕，避免鍵盤使用者無法選取
      const t = e.target;
      if (t && (t.tagName === "BUTTON" || (t.closest && t.closest("button")))) return;
      e.preventDefault(); startQuiz();
    }
  });

  render();
  renderDaily();

  // 註冊 Service Worker，讓 App 加到主畫面後可離線使用
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
